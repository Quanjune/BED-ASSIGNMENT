<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./Template/template.css">
  <link rel="stylesheet" href="./styles/products.css">
  <link rel="stylesheet" href="./styles/payment.css">
  <title>Payment Successful</title>
</head>
<body>
  <div id="site-header"></div>

  <main>
    <nav id="breadcrumbs"><ul><li><a href="./cart.html">Cart</a></li><li>Payment</li></ul></nav>

    <div class="result-card success">
      <div class="result-icon">&#10003;</div>
      <h2>Thank you for your payment!</h2>
      <p>Your order will be processed shortly.</p>
      <p class="order-ref" id="order-ref"></p>
      <div class="result-actions">
        <a class="btn-primary" href="./index.html">Return to Homepage</a>
        <a class="btn-secondary" href="./history.html">View Order History</a>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="./Template/template.js"></script>
  <script>
    // Show the order id / total that cart.js stored just before redirecting.
    const id = sessionStorage.getItem("lastOrderId");
    const total = sessionStorage.getItem("lastOrderTotal");
    if (id) {
      document.getElementById("order-ref").textContent =
        `Order #${id}` + (total ? ` — $${Number(total).toFixed(2)}` : "");
    }
  </script>
</body>
</html>
